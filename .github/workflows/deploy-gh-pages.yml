# 推送到 main 后构建，将 dist 推送到 gh-pages 分支。
# 站点绑定自定义域名 moyucode.cn（根目录 public/CNAME + 构建使用 https://moyucode.cn，无子路径 base）。

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build
        env:
          SITE_URL: https://moyucode.cn
          BASE_PATH: ""
        run: npm run build

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          cname: moyucode.cn
